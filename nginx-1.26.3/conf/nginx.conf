
worker_processes  1;

error_log  logs/error.log;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ===== Custom log format with detailed IP/visitor info =====
    log_format  tracker  '[$time_local] IP=$remote_addr '
                         'REQUEST="$request" STATUS=$status '
                         'BYTES=$body_bytes_sent '
                         'REFERER="$http_referer" '
                         'USER_AGENT="$http_user_agent" '
                         'FORWARDED_FOR="$http_x_forwarded_for"';

    # ===== IP-only log for quick reference =====
    log_format  ip_only  '$remote_addr - [$time_local] "$request" $status';

    # Main access log with full tracker format
    access_log  logs/access.log        tracker;

    # Dedicated IP log file
    access_log  logs/visitor_ips.log   ip_only;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # Serve the 404 page as the main page
        root   html;
        index  index.html;

        # Per-server IP-only log
        access_log  logs/visitor_ips.log  ip_only;

        location / {
            # Serve index.html for ALL routes (SPA behavior)
            try_files $uri $uri/ /index.html;
        }

        # Also serve the 404 page as the actual error page
        error_page  404  /index.html;

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
